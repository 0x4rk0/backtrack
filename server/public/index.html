<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>backtrack</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>backtrack</h1>
        <form id="search-form" class="search">
          <input id="query" type="search" autocomplete="off" placeholder="Search names, phrases, URLs">
          <button type="submit">Search</button>
        </form>
      </header>
      <section class="filters">
        <nav class="tabs">
          <button type="button" id="recent-tab">Recent</button>
          <button type="button" id="flagged-tab">Flagged</button>
        </nav>
        <label class="filter-toggle">
          <input type="checkbox" id="images-only">
          <span>Images captured</span>
        </label>
      </section>
      <section id="status" class="status">Recent captures</section>
      <section id="results" class="results"></section>
      <section class="management">
        <details class="panel phrases-panel">
          <summary>
            <span>Flagged names and phrases</span>
            <span>Matches are collected into this OSINT section as you browse.</span>
          </summary>
          <form id="phrases-form">
            <textarea id="phrases" rows="4" placeholder="Cody Bernardy&#10;Example Company&#10;username123"></textarea>
            <button type="submit">Save Flags</button>
          </form>
        </details>
        <details class="panel blocked-sites-panel">
          <summary>
            <span>Blocked capture sites</span>
            <span>Pages on these hosts are skipped by the browser add-on.</span>
          </summary>
          <form id="blocked-sites-form">
            <textarea id="blocked-sites" rows="3" placeholder="example.com&#10;social.example.com&#10;example.com/private"></textarea>
            <button type="submit">Save Blocks</button>
          </form>
        </details>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
