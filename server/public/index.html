<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>backtrack</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>backtrack</h1>
        <form id="search-form" class="search">
          <input id="query" type="search" autocomplete="off" placeholder="Search names, phrases, URLs">
          <button type="submit">Search</button>
        </form>
      </header>
      <section class="filters">
        <div class="filter-row">
          <nav class="tabs">
            <button type="button" id="recent-tab">Recent</button>
            <button type="button" id="flagged-tab">Flagged</button>
          </nav>
          <div class="filter-actions">
            <a class="filter-link" href="/images.html">Images captured</a>
            <button type="button" id="clear-findings" class="filter-danger">Clear findings</button>
          </div>
        </div>
        <div class="control-row">
          <div class="picker" id="phrases-picker">
            <button type="button" id="phrases-toggle" class="picker-toggle" aria-expanded="false">Flagged names and phrases</button>
            <div id="phrases-panel" class="picker-panel" hidden></div>
          </div>
          <div class="picker" id="blocked-sites-picker">
            <button type="button" id="blocked-sites-toggle" class="picker-toggle" aria-expanded="false">Blocked sites</button>
            <div id="blocked-sites-panel" class="picker-panel" hidden></div>
          </div>
        </div>
      </section>
      <section id="status" class="status">Recent captures</section>
      <section id="results" class="results"></section>
      <form id="phrases-form" hidden>
        <textarea id="phrases" rows="4"></textarea>
      </form>
      <form id="blocked-sites-form" hidden>
        <textarea id="blocked-sites" rows="3"></textarea>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
