<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>backtrack images</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>backtrack images</h1>
        <div class="page-actions">
          <a class="filter-link" href="/">Findings</a>
        </div>
      </header>
      <section class="filters">
        <div class="filter-row">
          <nav class="tabs">
            <button type="button" id="recent-tab">Recent</button>
            <button type="button" id="flagged-tab">Flagged</button>
          </nav>
        </div>
      </section>
      <section id="status" class="status">Recent image captures</section>
      <section id="image-results" class="image-results"></section>
    </main>
    <script src="/images.js"></script>
  </body>
</html>
